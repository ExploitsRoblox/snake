<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala Do Futuro Aluno</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0c; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; cursor: crosshair; }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: white; pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .leaderboard {
            position: absolute; top: 20px; right: 20px;
            color: #00ff88; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 8px;
            font-size: 14px; min-width: 150px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score" style="font-size: 36px; font-weight: bold;">Pontos: 0</div>
        <div style="color: #aaa;">Use o mouse para guiar • Clique para NITRO</div>
    </div>

    <div class="leaderboard" id="leaderboard">
        <strong>RANKING</strong>
        <div id="rank-list"></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const rankList = document.getElementById('rank-list');

        // --- CONFIGURAÇÕES DO MUNDO ---
        const WORLD_SIZE = 4000; // Mapa 10x maior que a tela padrão
        const FOOD_COUNT = 400;
        const ENEMY_COUNT = 15;
        
        let score = 0;
        let gameOver = false;
        let foods = [];
        let enemies = [];
        let isBoosting = false;

        // Câmera
        const camera = { x: 0, y: 0 };

        class Snake {
            constructor(x, y, color, name = "Bot", isPlayer = false) {
                this.pos = { x, y };
                this.segments = [];
                this.length = 30;
                this.radius = 14;
                this.baseSpeed = 3.5;
                this.speed = 3.5;
                this.angle = Math.random() * Math.PI * 2;
                this.color = color;
                this.name = name;
                this.isPlayer = isPlayer;
                this.dead = false;
                this.hue = Math.random() * 360;
            }

            update(targetX, targetY, boost = false) {
                if (this.dead) return;

                // Lógica de Velocidade/Nitro
                if (boost && this.length > 15) {
                    this.speed = this.baseSpeed * 1.8;
                    if (Math.random() > 0.85) this.length -= 0.3;
                } else {
                    this.speed = this.baseSpeed;
                }

                // IA ou Input Humano
                const targetAngle = Math.atan2(targetY - this.pos.y, targetX - this.pos.x);
                let angleDiff = targetAngle - this.angle;
                while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                this.angle += angleDiff * 0.12;

                this.pos.x += Math.cos(this.angle) * this.speed;
                this.pos.y += Math.sin(this.angle) * this.speed;

                // Segurar no mundo
                this.pos.x = Math.max(0, Math.min(WORLD_SIZE, this.pos.x));
                this.pos.y = Math.max(0, Math.min(WORLD_SIZE, this.pos.y));

                this.segments.unshift({ x: this.pos.x, y: this.pos.y });
                if (this.segments.length > this.length) this.segments.pop();

                this.checkFoodCollision();
            }

            checkFoodCollision() {
                for (let i = foods.length - 1; i >= 0; i--) {
                    const f = foods[i];
                    const dist = Math.hypot(f.x - this.pos.x, f.y - this.pos.y);
                    if (dist < this.radius + f.radius) {
                        this.length += f.isLoot ? 5 : 2;
                        if (this.isPlayer) {
                            score += f.isLoot ? 50 : 10;
                            scoreElement.innerText = `Pontos: ${score}`;
                        }
                        foods.splice(i, 1);
                        if (!f.isLoot) foods.push(createFood());
                    }
                }
            }

            draw() {
                if (this.dead) return;

                // Desenhar Corpo com Gradiente
                ctx.save();
                for (let i = this.segments.length - 1; i >= 0; i--) {
                    if (i % 4 === 0) {
                        const seg = this.segments[i];
                        const sizeMult = 1 - (i / (this.segments.length * 1.5)); // Estreita a cauda
                        
                        ctx.beginPath();
                        ctx.arc(seg.x - camera.x, seg.y - camera.y, this.radius * sizeMult, 0, Math.PI * 2);
                        ctx.fillStyle = i === 0 ? 'white' : this.color;
                        ctx.shadowBlur = i === 0 ? 15 : 0;
                        ctx.shadowColor = this.color;
                        ctx.fill();
                        ctx.closePath();
                    }
                }

                // Nome do Bot/Player
                ctx.fillStyle = "white";
                ctx.font = "bold 14px Arial";
                ctx.textAlign = "center";
                ctx.fillText(this.name, this.pos.x - camera.x, this.pos.y - camera.y - 25);
                ctx.restore();
            }

            die() {
                if (this.dead) return;
                this.dead = true;
                this.segments.forEach((seg, i) => {
                    if (i % 5 === 0) {
                        foods.push({
                            x: seg.x + (Math.random()-0.5)*20, 
                            y: seg.y + (Math.random()-0.5)*20, 
                            radius: 10, 
                            color: this.color, isLoot: true 
                        });
                    }
                });

                if (this.isPlayer) {
                    gameOver = true;
                    setTimeout(() => location.reload(), 3000);
                }
            }
        }
        // Função para criar comida, com variação de tamanho e cor
        function createFood(isLoot = false) {
            return {
                x: Math.random() * WORLD_SIZE,
                y: Math.random() * WORLD_SIZE,
                radius: isLoot ? 8 : 5,
                color: `hsl(${Math.random() * 360}, 80%, 60%)`,
                isLoot: isLoot
            };
        }

        // --- INICIALIZAÇÃO ---
        const player = new Snake(WORLD_SIZE/2, WORLD_SIZE/2, '#00ff88', "Você", true);
        
        // Criar Bots, incluindo o Murilo
        // --- MODIFICAÇÃO NA INICIALIZAÇÃO DOS BOTS ---
for (let i = 0; i < ENEMY_COUNT; i++) {
    let name = "Bot_" + Math.floor(Math.random() * 100);
    let color = `hsl(${Math.random() * 360}, 70%, 50%)`;
    
    let bot;
    if (i === 0) { 
        // O MURILO SURGE GIGANTE
        bot = new Snake(Math.random() * WORLD_SIZE, Math.random() * WORLD_SIZE, "#ff0055", "MURILO");
        bot.length = 1250; // 50x o tamanho inicial padrão (25 * 50)
        bot.radius = 40;   // Deixei ele bem mais largo também para parecer imponente
        bot.baseSpeed = 2; // Por ser gigante, ele se move um pouco mais lento (equilíbrio)
    } else {
        bot = new Snake(Math.random() * WORLD_SIZE, Math.random() * WORLD_SIZE, color, name);
    }
    
    enemies.push(bot);
}

        for (let i = 0; i < FOOD_COUNT; i++) foods.push(createFood());

        const mouse = { x: 0, y: 0 };
        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        window.addEventListener('mousedown', () => isBoosting = true);
        window.addEventListener('mouseup', () => isBoosting = false);

        function checkCollisions() {
            const all = [player, ...enemies];
            all.forEach(s1 => {
                if (s1.dead) return;
                all.forEach(s2 => {
                    if (s2.dead || s1 === s2) return;
                    s2.segments.forEach((seg, idx) => {
                        if (idx < 5) return;
                        const dist = Math.hypot(s1.pos.x - seg.x, s1.pos.y - seg.y);
                        if (dist < s1.radius + s2.radius - 8) s1.die();
                    });
                });
            });
        }

        function update() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            if (!gameOver) {
                // Converter mouse de tela para coordenadas do mundo
                const worldMouseX = mouse.x + camera.x;
                const worldMouseY = mouse.y + camera.y;
                player.update(worldMouseX, worldMouseY, isBoosting);

                // Câmera segue o player suavemente
                camera.x += (player.pos.x - canvas.width / 2 - camera.x) * 0.1;
                camera.y += (player.pos.y - canvas.height / 2 - camera.y) * 0.1;
            }

            enemies.forEach(en => {
                if (en.dead) {
                    if (Math.random() < 0.002) {
                        en.dead = false;
                        en.pos = { x: Math.random() * WORLD_SIZE, y: Math.random() * WORLD_SIZE };
                        en.length = 30;
                    }
                    return;
                }
                
                // IA Murilo é mais agressiva (tenta cercar se estiver perto)
                let tx, ty;
                const distToPlayer = Math.hypot(player.pos.x - en.pos.x, player.pos.y - en.pos.y);
                
                if (en.name === "MURILO" && distToPlayer < 400 && !player.dead) {
                    tx = player.pos.x; ty = player.pos.y; // Murilo persegue!
                } else {
                    // IA Normal: busca comida
                    const nearestFood = foods[0]; 
                    tx = nearestFood.x; ty = nearestFood.y;
                }
                en.update(tx, ty, en.name === "MURILO" && distToPlayer < 200);
            });

            checkCollisions();
            updateLeaderboard();
        }

        function updateLeaderboard() {
            const all = [player, ...enemies].filter(s => !s.dead)
                        .sort((a,b) => b.length - a.length)
                        .slice(0, 5);
            rankList.innerHTML = all.map((s, i) => `<div>${i+1}. ${s.name}: ${Math.floor(s.length*10)}</div>`).join('');
        }

        function drawGrid() {
            ctx.strokeStyle = "#222";
            ctx.lineWidth = 2;
            const step = 100;
            const startX = Math.floor(camera.x / step) * step;
            const startY = Math.floor(camera.y / step) * step;

            for (let x = startX; x < startX + canvas.width + step; x += step) {
                ctx.beginPath();
                ctx.moveTo(x - camera.x, 0);
                ctx.lineTo(x - camera.x, canvas.height);
                ctx.stroke();
            }
            for (let y = startY; y < startY + canvas.height + step; y += step) {
                ctx.beginPath();
                ctx.moveTo(0, y - camera.y);
                ctx.lineTo(canvas.width, y - camera.y);
                ctx.stroke();
            }
        }

        function draw() {
            ctx.fillStyle = '#0a0a0c';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawGrid();

            // Bordas do Mundo
            ctx.strokeStyle = "#ff4444";
            ctx.lineWidth = 20;
            ctx.strokeRect(-camera.x, -camera.y, WORLD_SIZE, WORLD_SIZE);
            // kill on touch border
            if (player.pos.x < 10 || player.pos.x > WORLD_SIZE - 10 || player.pos.y < 10 || player.pos.y > WORLD_SIZE - 10) {
                player.die();
            }

            foods.forEach(f => {
                ctx.beginPath();
                ctx.arc(f.x - camera.x, f.y - camera.y, f.radius, 0, Math.PI * 2);
                ctx.fillStyle = f.color;
                if (f.isLoot) { ctx.shadowBlur = 15; ctx.shadowColor = f.color; }
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            enemies.forEach(en => en.draw());
            if (!gameOver) player.draw();
            else {
                ctx.fillStyle = "white";
                ctx.font = "bold 60px Arial";
                ctx.textAlign = "center";
                ctx.fillText("VOCÊ MORREU!", canvas.width/2, canvas.height/2);
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
